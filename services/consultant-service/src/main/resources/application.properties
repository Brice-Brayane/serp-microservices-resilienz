spring.application.name=consultant-service
server.port=${PORT:8082}
debug=false

# =================================
# DATABASE (PostgreSQL)
# =================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/consultant_db
spring.datasource.username=${DB_USER:consultant_user}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# =================================
# OPENAPI / SWAGGER
# =================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=de.ostfalia.serp.consultant.controller

# =================================
# FIX LOADBALANCER DOCKER
# =================================
# Ceci corrige ton Erreur 500 ! On dit au service où trouver project-service
spring.cloud.discovery.client.simple.instances.project-service[0].uri=http://project-service:8084

# =================================
# RÉSILIENCE (CIRCUIT BREAKER)
# =================================
# Active le monitoring du disjoncteur
management.health.circuitbreakers.enabled=true

# Règle pour notre disjoncteur nommé "projectServiceCB"
# Si 50% des appels échouent, le disjoncteur s'ouvre (coupe la connexion)
resilience4j.circuitbreaker.instances.projectServiceCB.failureRateThreshold=50
# On attend 5 secondes avant de tester si le project-service est revenu (Half-Open)
resilience4j.circuitbreaker.instances.projectServiceCB.waitDurationInOpenState=5s
# On autorise 2 appels de test quand il est en mode Half-Open
resilience4j.circuitbreaker.instances.projectServiceCB.permittedNumberOfCallsInHalfOpenState=2
# Le disjoncteur a besoin de minimum 2 appels pour calculer ses statistiques
resilience4j.circuitbreaker.instances.projectServiceCB.minimumNumberOfCalls=2

# =================================
# LOGGING
# =================================
logging.level.org.springframework.web=INFO
logging.level.de.ostfalia.serp=DEBUG